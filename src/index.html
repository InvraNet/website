<body>

    <header>
        <h2>InvraNet's Website</h2>
        <nav>
            <a href="/">Home</a>
            <a href="download/">Downloads</a>

    <main>
        <h1>Welcome!</h1>
        <p>Hello, welcome to my website. Have a squiz around!</p>
        <h1>Recent Videos</h1> <br>
        <div class="video-grid" id="latestVideos"></div>
    </main>

    <script>
        // Function to fetch and display latest YouTube videos
        function fetchLatestVideos() {
            // Your YouTube Data API key
            const apiKey = 'AIzaSyAP-d93ApcU7vA5PZ5FCLZVDESwzEv6HTo';
            // Your YouTube channel ID
            const channelId = 'UCl6xerszOF4Fhgabvou2rkw';
            // Number of videos to fetch
            const maxResults = 6;
            // YouTube Data API endpoint URL
            const apiUrl = `https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet,id&order=date&maxResults=${maxResults}`;

            // Make AJAX request to fetch data from YouTube Data API
            fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const videosContainer = document.getElementById('latestVideos');
                data.items.forEach(item => {
                    const videoTitle = item.snippet.title;
                    const videoDescription = item.snippet.description;
                    const videoId = item.id.videoId;
                    const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;

                    // Create bento box container
                    const bentoBox = document.createElement('div');
                    bentoBox.classList.add('bento-box');

                    // Create video container
                    const videoContainer = document.createElement('div');
                    videoContainer.classList.add('video-container');
                    videoContainer.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;

                    // Create video description
                    const descriptionElement = document.createElement('p');
                    descriptionElement.innerText = videoDescription;

                    // Append elements to bento box container
                    bentoBox.appendChild(videoContainer);
                    bentoBox.appendChild(descriptionElement);

                    // Add event listener to bento box to redirect to video URL
                    bentoBox.addEventListener('click', () => {
                        window.location.href = videoUrl;
                    });

                    // Append bento box to videos container
                    videosContainer.appendChild(bentoBox);
                });
            })
            .catch(error => console.error('Error fetching data:', error));
        }

        // Call the function to fetch latest videos when the page loads
        window.onload = fetchLatestVideos;
    </script>

</body>
</html>
