<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvraNet's Website</title>
  <link rel="stylesheet" href="dist/style.css">
</head>
<body>
  <header class="header">
    <h1 class="logo">InvraNet's Website</h1>
    <div class="settings">
      <button class="settings-button" onclick="toggleSettingsPane()">
        <img src="path/to/cog-icon.png" alt="Settings Icon">
      </button>
    </div>
  </header>

  <main class="container">
    <div class="bento-boxes">
        <section class="bento-boxes">
            <a href="https://www.youtube.com/@invranet" target="_blank" class="bento-box">
              <img src="/img/youtube_pres_log.png" alt="YouTube">
            </a>
            <a href="https://discord.gg/mDqRKuE9br" target="_blank" class="bento-box">
              <img src="/img/discord_pres_log.png" alt="Discord Server">
            </a>
          </section>          
    </div>
  </main>

  <div class="settings-pane" id="settingsPane">
    <h2>Settings</h2>
    <label for="darkModeToggle">Dark Mode</label>
    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
  </div>

  <script src="dist/script.js"></script>
</body>
</html>
